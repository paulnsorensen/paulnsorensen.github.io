<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🧀</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="Paul Sorensen — projects">
  <style>
    :root { --fg: #f5f5f5; --bg: #000; --muted: #999; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 5vw, 4rem);
      flex-wrap: wrap;
    }
    .portrait {
      width: clamp(220px, 36vmin, 420px);
      height: auto;
      display: block;
      user-select: none;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      font-size: clamp(1rem, 2.2vmin, 1.25rem);
    }
    li::before {
      content: "🧀";
      margin-right: 0.6rem;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla", sans-serif;
    }
    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
      padding-bottom: 2px;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.85;
    }
    a:hover, a:focus { border-color: currentColor; opacity: 1; }
    .desc { color: var(--muted); margin-left: 0.4rem; font-size: 0.85em; }
  </style>
</head>
<body>
  <main>
    <img class="portrait" src="cheeselord.gif" alt="Cheese Lord">
    <ul>
      <li><a href="https://github.com/paulnsorensen/easy-cheese">easy-cheese</a><span class="desc">— cheese your code</span></li>
      <li><a href="https://github.com/paulnsorensen/cheese-flow">cheese-flow</a><span class="desc">— agent flows</span></li>
      <li><a href="https://github.com/paulnsorensen/skillz-that-grillz">skillz-that-grillz</a><span class="desc">— skill repo</span></li>
      <li><a href="https://github.com/paulnsorensen/milknado">milknado</a><span class="desc">— mikado method, ralphified</span></li>
      <li><a href="https://github.com/paulnsorensen/hallouminate">hallouminate</a><span class="desc">— grounding CLI</span></li>
      <li><a href="https://github.com/paulnsorensen/vaudeville">vaudeville</a><span class="desc">— SLM hook enforcement</span></li>
      <li><a href="https://github.com/paulnsorensen/dotfiles">dotfiles</a><span class="desc">— the whole rig</span></li>
    </ul>
  </main>
</body>
</html>
